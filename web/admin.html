<!DOCTYPE html>
<html>
<head>

<title>Admin Login - McD Digital</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/web/css/admin.css">

</head>

<body>

<div class="login-container">

<div class="card p-4 shadow login-card">

<h4 class="text-center mb-3">Admin Login</h4>

<input type="text" id="username"
class="form-control mb-2"
placeholder="Username">

<input type="password" id="password"
class="form-control mb-3"
placeholder="Password">

<button onclick="login()" class="btn btn-dark w-100">
Login
</button>

<div id="msg" class="text-danger mt-2 text-center"></div>

</div>

</div>

<script src="/web/js/admin.js"></script>

</body>
</html>
